{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<h1>Users</h1>
<button type="button" onclick="window.location.href='{{ url_for('new_user') }}'">+ New User</button>
<table border="1" cellpadding="4">
  <tr><th>Name</th><th>Email</th><th>Department</th><th>Role</th><th></th></tr>
  {% for u in users %}
  <tr>
    <td>{{ u.full_name }}</td>
    <td>{{ u.email }}</td>
    <td>{{ u.dept_name or '—' }}</td>
    <td>{{ u.role }}</td>
    <td>
      <button type="button">Delete</button>
    </td>
  </tr>
  {% else %}
  <tr><td>No users yet.</td></tr>
  {% endfor %}
</table>
{% endblock %}
